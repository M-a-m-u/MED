<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>MED – Mobiler Entstörungsdienst</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#50d857;
color:white;
text-align:center;
}

/* Cover */

#cover{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100dvh;
cursor:pointer;
}

#cover h1{
font-size:4.2em;
margin-bottom:10px;
}

#cover p{
font-size:1em;
opacity:0.8;
}

/* Hauptseite */

#mainPage{
display:none;
padding:20px;
}

h2{
margin-top:20px;
}

.feld{
margin-top:15px;
display:flex;
flex-direction:column;
}

.grid2{
display:grid;
grid-template-columns:repeat(2, minmax(0,1fr));
gap:15px;
margin-top:20px;
}

input, select{
width:100%;
box-sizing:border-box;
height:42px;
padding:6px 10px;
font-size:16px;
border-radius:8px;
border:none;
margin-top:5px;
}

/* iPhone Fix für Datumfeld */

input[type="date"]{
appearance:none;
-webkit-appearance:none;

width:100%;
max-width:100%;

height:42px;
line-height:42px;

box-sizing:border-box;
font-size:16px;
padding:0 8px;
}

.zeitGrid input{
min-width:0;
width:100%;
}

#neuerEinsatz{
margin-top:30px;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
background:white;
color:#50d857;
font-weight:bold;
cursor:pointer;
width:100%;
}

#einsatzListe{
margin-top:25px;
}

.einsatz{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:15px;
text-align:left;
}

.einsatzFeld{
margin-top:10px;
display:flex;
flex-direction:column;
}

.einsatzFeldGross{
margin-top:12px;
display:flex;
flex-direction:column;
}

.einsatzFeldGross textarea{
width:100%;
box-sizing:border-box;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
resize:vertical;
}

.einsatzFeld input{
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:4px;
}

.zeitGrid{
display:grid;
grid-template-columns:repeat(3, minmax(0,1fr));
gap:8px;
margin-top:10px;
width:100%;
}

/* iPhone Fix für Zeitfelder */

.zeitGrid input[type="time"]{
appearance:none;
-webkit-appearance:none;

width:100%;
max-width:100%;

min-width:0;

height:40px;

box-sizing:border-box;
font-size:15px;
padding:0 4px;
}

.einsatzHeader{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.toggleSymbol{
font-size:18px;
}

.einsatzInhalt{
margin-top:10px;
}

#tagSpeichern{
margin-top:25px;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
background:#0575d1;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
}

#historieListe{
margin-top:20px;
}

.historieEintrag{
text-align:left;
margin:10px 12px;
}

.historieHeader{

cursor:pointer;
font-weight:bold;

display:grid;
grid-template-columns: 

18px     /* Pfeil */
95px    /* Datum */
60px     /* Schicht */
70px     /* Wagen */
1fr;     /* Name */

gap:6px;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;

align-items:center;

}


.historieInhalt{
padding-left:20px;
margin-top:8px;
}

.historieEinsatz{
text-align:left;
margin-top:8px;
margin-left: -18px;;
}

.historieEinsatzHeader{
cursor:pointer;
font-weight:bold;
}

.historieEinsatzInhalt{
padding-left:20px;
margin-top:6px;
}

#historieButton{
margin-top:25px;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
background:#07810d;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
}

#zurueckZurApp{
margin-top:20px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#50d857;
color:white;
}

#zurueckZurHistorie{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#444;
color:white;
}

.tagLoeschenButton{
margin-top:10px;
padding:8px;
color:#c40000;
font-weight:bold;
cursor:pointer;
}

.historieLoeschenEinsatz{
color:#c40000;
margin-right:6px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- Cover -->

<div id="cover" onclick="startApp()">
<h1>126</h1>
<p>Mobiler Entstörungsdienst</p>
<p>Tippen zum Starten</p>
</div>


<!-- Hauptseite -->

<div id="mainPage">

<div id="historieHinweis" style="display:none;background:#ffeeba;color:#333;padding:10px;border-radius:8px;margin-bottom:10px;">
Du schaust gerade einen gespeicherten Arbeitstag an.
<button id="zurueckZumAktuellenTag">Zurück zum aktuellen Arbeitstag</button>
</div>    

<h2>Arbeitstag</h2>

<div class="grid2">

<div class="feld">
<label>Datum</label>
<input type="date" id="datum">
</div>

<div class="feld">
<label>Schicht</label>
<select id="schicht">
<option>Früh</option>
<option>S-Früh</option>
<option>Tag</option>
<option>S-Spät</option>
<option>Spät</option>
<option>Nacht</option>
<option>Andere</option>
</select>
</div>

<div class="feld">
<label>Wagen</label>

<select id="wagen">
<option value="">Fahrzeug wählen</option>
<option>WG 408</option>
<option>WG 351</option>
<option>WG 508</option>
<option>WG 509</option>
<option>WG 215</option>
<option>WG 216</option>
</select>

</div>

<div class="feld">
<label>Kollege</label>

<input list="kollegenListe" id="kollege" placeholder="Kollege wählen">

<datalist id="kollegenListe">
<option value="Schischke">
<option value="Tichelkamp">
<option value="Stoll">
<option value="Zöller">
<option value="Dogan">
</datalist>

<datalist id="einsatzartenListe">

<option value="Gasgeruch">
<option value="Gasgeruch im Haus">
<option value="Gasgeruch im Keller">
<option value="GZ macht Geräusche">
<option value="Gasdruck überprüfen">
<option value="Gasleitung beschädigt">
<option value="Gasleuchte angefahren">
<option value="Wasserrohrbruch">
<option value="Wasser aus Erde">
<option value="W.-HAE sperrt nicht"> 
<option value="W.-Altg undicht"> 
<option value="Strom Lampe angefahren">
<option value="Verteilerschrank angefahren">
<option value="Stromausfall">
<option value="Netzstörung">
<option value="Haus ohne Strom">
<option value="Wohnung ohne Strom">
<option value="Hausanschluss Störung">
<option value="Kabel beschädigt">
<option value="Zählerwechsel">
<option value="Kontrolle">

</datalist>

</div>

</div>


<button id="neuerEinsatz">+ Einsatz hinzufügen</button>

<div id="einsatzListe"></div>

<button id="tagSpeichern">Arbeitstag speichern</button>

<button id="historieButton">Historie anzeigen</button>

</div>

<div id="historiePage" style="display:none">

<h2>Historie</h2>

<div id="historieListe"></div>

<button id="zurueckZurApp">Zurück</button>

<div class="jsonButtons">

<button id="jsonSpeichern">JSON sichern</button>

<button id="jsonLaden">JSON laden</button>

</div>

<input type="file" id="jsonDateiInput" accept=".json" style="display:none">

</div>

<script>

function startApp(){
document.getElementById("cover").style.display="none";
document.getElementById("mainPage").style.display="block";
}


/* Datum automatisch setzen */

window.onload = function(){

let heute = new Date().toISOString().split("T")[0];
document.getElementById("datum").value = heute;
document.getElementById("datum").addEventListener("change", function(){

let bestaetigung = confirm("Neuen Arbeitstag beginnen? Alle aktuellen Einsätze werden gelöscht.");

if(bestaetigung){

document.getElementById("einsatzListe").innerHTML = "";

einsatzNummer = 0;

}

});

/* letzten Wagen laden */

let letzterWagen = localStorage.getItem("wagen");

if(letzterWagen){
document.getElementById("wagen").value = letzterWagen;
}


/* letzten Kollegen laden */

let letzterKollege = localStorage.getItem("kollege");

if(letzterKollege){
document.getElementById("kollege").value = letzterKollege;
}

/* letzte Schicht laden */

let letzteSchicht = localStorage.getItem("schicht");

if(letzteSchicht){
document.getElementById("schicht").value = letzteSchicht;
}

}

document.getElementById("wagen").addEventListener("change", function(){
localStorage.setItem("wagen", this.value);
});


document.getElementById("kollege").addEventListener("change", function(){
localStorage.setItem("kollege", this.value);
});


document.getElementById("schicht").addEventListener("change", function(){
localStorage.setItem("schicht", this.value);
});

let aktuellerTag = null;

let einsatzNummer = 0;

document.getElementById("neuerEinsatz").addEventListener("click", function(){

einsatzNummer++;

let container = document.createElement("div");
container.className = "einsatz";

container.innerHTML = `
<div class="einsatzHeader">
<h3 class="einsatzTitel">Einsatz ${einsatzNummer}</h3>
<div>
<span class="toggleSymbol">▼</span>
<span class="loeschenSymbol" style="margin-left:10px;cursor:pointer;color:red;">✖</span>
</div>
</div>

<div class="einsatzInhalt">

<div class="einsatzFeld">
<label>Einsatzart</label>
<input list="einsatzartenListe" placeholder="Einsatzart wählen oder tippen">
</div>

<div class="einsatzFeld">
<label>Adresse</label>
<input type="text" class="adresseFeld" placeholder="Straße / Hausnummer">
</div>

<div class="einsatzFeld">
<label>Melder</label>
<input type="text" placeholder="Name oder Firma">
</div>

<div class="zeitGrid">

<div class="einsatzFeld">
<label>Meldung</label>
<input type="time">
</div>

<div class="einsatzFeld">
<label>Eintreffen</label>
<input type="time">
</div>

<div class="einsatzFeld">
<label>Abfahrt</label>
<input type="time">
</div>

</div>

<div class="einsatzFeldGross">
<label>Feststellung</label>
<textarea rows="3" placeholder="Situation vor Ort"></textarea>
</div>

<div class="einsatzFeldGross">
<label>Maßnahmen</label>
<textarea rows="3" placeholder="Was wurde unternommen"></textarea>
</div>

<div class="einsatzFeldGross">
<label>Bemerkung</label>
<textarea rows="2" placeholder="Weitere Hinweise"></textarea>
</div>
</div>
`;

container.querySelector(".einsatzHeader").addEventListener("click", function(){

let inhalt = container.querySelector(".einsatzInhalt");
let symbol = container.querySelector(".toggleSymbol");

if(inhalt.style.display === "none"){
inhalt.style.display = "block";
symbol.textContent = "▼";
}else{
inhalt.style.display = "none";
symbol.textContent = "▶";
}

});



let adresseInput = container.querySelector(".adresseFeld");
let titel = container.querySelector(".einsatzTitel");

adresseInput.addEventListener("input", function(){

if(this.value.trim() !== ""){
titel.textContent = "Einsatz " + einsatzNummer + " – " + this.value;
}else{
titel.textContent = "Einsatz " + einsatzNummer;
}

});

let loeschenButton = container.querySelector(".loeschenSymbol");

loeschenButton.addEventListener("click", function(){

container.remove();

setTimeout(function(){
aktualisiereEinsatzNummern();
autoSpeichern();
},0);

});




document.getElementById("einsatzListe").appendChild(container);

});

document.getElementById("tagSpeichern").addEventListener("click", function(){

let arbeitstag = {};

arbeitstag.datum = document.getElementById("datum").value;
arbeitstag.schicht = document.getElementById("schicht").value;
arbeitstag.wagen = document.getElementById("wagen").value;
arbeitstag.kollege = document.getElementById("kollege").value;

arbeitstag.einsaetze = [];

let einsaetze = document.querySelectorAll(".einsatz");

einsaetze.forEach(function(einsatz){

let daten = {};

let inputs = einsatz.querySelectorAll("input, textarea");

daten.einsatzart = inputs[0].value;
daten.adresse = inputs[1].value;
daten.melder = inputs[2].value;
daten.meldung = inputs[3].value;
daten.eintreffen = inputs[4].value;
daten.abfahrt = inputs[5].value;
daten.feststellung = inputs[6].value;
daten.massnahmen = inputs[7].value;
daten.bemerkung = inputs[8].value;

arbeitstag.einsaetze.push(daten);

});

let archiv = JSON.parse(localStorage.getItem("MED_Archiv")) || [];

let index = archiv.findIndex(tag => tag.datum === arbeitstag.datum);

if(index !== -1){

archiv[index] = arbeitstag;

}else{

archiv.push(arbeitstag);

}

localStorage.setItem("MED_Archiv", JSON.stringify(archiv));

alert("Arbeitstag gespeichert.");

});

function aktualisiereEinsatzNummern(){

let alleEinsaetze = document.querySelectorAll(".einsatz");

alleEinsaetze.forEach(function(einsatz, index){

let titel = einsatz.querySelector(".einsatzTitel");

titel.textContent = "Einsatz " + (index + 1);

});

}

function autoSpeichern(){

let arbeitstag = {};

arbeitstag.datum = document.getElementById("datum").value;
arbeitstag.schicht = document.getElementById("schicht").value;
arbeitstag.wagen = document.getElementById("wagen").value;
arbeitstag.kollege = document.getElementById("kollege").value;

arbeitstag.einsaetze = [];

let einsaetze = document.querySelectorAll(".einsatz");

einsaetze.forEach(function(einsatz){

let daten = {};

let inputs = einsatz.querySelectorAll("input, textarea");

daten.einsatzart = inputs[0].value;
daten.adresse = inputs[1].value;
daten.melder = inputs[2].value;
daten.meldung = inputs[3].value;
daten.eintreffen = inputs[4].value;
daten.abfahrt = inputs[5].value;
daten.feststellung = inputs[6].value;
daten.massnahmen = inputs[7].value;
daten.bemerkung = inputs[8].value;

arbeitstag.einsaetze.push(daten);

});

localStorage.setItem("MED_AktuellerTag", JSON.stringify(arbeitstag));

}

function downloadJSON(daten){

let json = JSON.stringify(daten, null, 2);

let blob = new Blob([json], {type: "application/json"});

let url = URL.createObjectURL(blob);

let link = document.createElement("a");

let datum = new Date().toISOString().split("T")[0];

link.href = url;
link.download = "MED_" + datum + ".json";

link.click();

URL.revokeObjectURL(url);

}

document.getElementById("historieButton").addEventListener("click", function(){

aktuellerTag = speichereAktuellenTag();   

document.getElementById("mainPage").style.display = "none";
document.getElementById("historiePage").style.display = "block";

ladeHistorie();

});

document.getElementById("zurueckZurApp").addEventListener("click", function(){

document.getElementById("historiePage").style.display = "none";
document.getElementById("mainPage").style.display = "block";

});

document.getElementById("jsonSpeichern").addEventListener("click", function(){

if(confirm("Backup der MED-Daten als JSON speichern?")){

exportJSON();

}

});

document.getElementById("jsonLaden").addEventListener("click", function(){

if(confirm("JSON-Backup laden? Aktuelle Daten können überschrieben werden.")){

document.getElementById("jsonDateiInput").click();

}

});

document.getElementById("zurueckZumAktuellenTag").addEventListener("click", function(){

document.getElementById("historieHinweis").style.display = "none";

if(aktuellerTag){
ladeArbeitstag(aktuellerTag);
}

});


function ladeHistorie(){

let archiv = JSON.parse(localStorage.getItem("MED_Archiv")) || [];

archiv.sort((a,b)=> new Date(b.datum) - new Date(a.datum));

let liste = document.getElementById("historieListe");

liste.innerHTML = "";

archiv.forEach(function(tag, indexTag){

let div = document.createElement("div");

div.className = "historieEintrag";

let d = tag.datum.split("-");
let datumAnzeige = d[2] + "." + d[1] + "." + d[0];

div.innerHTML = `
<div class="historieHeader">

<span class="historiePfeil">▶</span>
<span class="historieDatum">${datumAnzeige}</span>
<span class="historieSchicht">${tag.schicht}</span>
<span class="historieWagen">${tag.wagen}</span>
<span class="historieName">${tag.kollege}</span>

</div>

<div class="historieInhalt" style="display:none"></div>
`;



let header = div.querySelector(".historieHeader");
let inhalt = div.querySelector(".historieInhalt");
let pfeil = div.querySelector(".historiePfeil");

header.addEventListener("click", function(){

if(inhalt.style.display === "none"){

inhalt.style.display = "block";
pfeil.textContent = "▼";

inhalt.innerHTML = "";

tag.einsaetze.forEach(function(e, index){

let eintrag = document.createElement("div");

eintrag.className = "historieEinsatz";

eintrag.innerHTML = `
<div class="historieEinsatzHeader">
<span class="historieLoeschenEinsatz">✖</span>
<span class="historiePfeil">▶</span>
<b>Einsatz ${index + 1}</b> – ${e.einsatzart} – ${e.adresse}
</div>

<div class="historieEinsatzInhalt" style="display:none">

<b>Melder:</b> ${e.melder}<br>
<b>Meldung:</b> ${e.meldung}<br>
<b>Eintreffen:</b> ${e.eintreffen}<br>
<b>Abfahrt:</b> ${e.abfahrt}<br><br>

<b>Feststellung:</b><br>
${e.feststellung}<br><br>

<b>Maßnahmen:</b><br>
${e.massnahmen}<br><br>

<b>Bemerkung:</b><br>
${e.bemerkung}

</div>
`;

let h = eintrag.querySelector(".historieEinsatzHeader");
let c = eintrag.querySelector(".historieEinsatzInhalt");
let p = eintrag.querySelector(".historiePfeil");
let loesch = eintrag.querySelector(".historieLoeschenEinsatz");

h.addEventListener("click", function(){

if(c.style.display === "none"){
c.style.display = "block";
p.textContent = "▼";
}else{
c.style.display = "none";
p.textContent = "▶";
}

});

loesch.addEventListener("click", function(event){

event.stopPropagation();

if(confirm("Diesen Einsatz wirklich löschen?")){

let archiv = JSON.parse(localStorage.getItem("MED_Archiv")) || [];
archiv.sort((a,b)=> new Date(b.datum) - new Date(a.datum));
archiv[indexTag].einsaetze.splice(index,1);

localStorage.setItem("MED_Archiv", JSON.stringify(archiv));

ladeHistorie();

}

});

inhalt.appendChild(eintrag);

});

let loeschButton = document.createElement("div");

loeschButton.className = "tagLoeschenButton";

loeschButton.textContent = "🗑 Arbeitstag löschen";

inhalt.appendChild(loeschButton);

loeschButton.addEventListener("click", function(){

if(confirm("Diesen gesamten Arbeitstag wirklich löschen?")){

let archiv = JSON.parse(localStorage.getItem("MED_Archiv")) || [];

archiv.splice(indexTag, 1);

localStorage.setItem("MED_Archiv", JSON.stringify(archiv));

ladeHistorie();

}

});

}else{

inhalt.style.display = "none";
pfeil.textContent = "▶";

}

});


liste.appendChild(div);

});

}

function ladeArbeitstag(tag){

document.getElementById("historiePage").style.display = "none";
document.getElementById("mainPage").style.display = "block";

document.getElementById("historieHinweis").style.display = "block";

document.getElementById("datum").value = tag.datum;
document.getElementById("schicht").value = tag.schicht;
document.getElementById("wagen").value = tag.wagen;
document.getElementById("kollege").value = tag.kollege;

document.getElementById("einsatzListe").innerHTML = "";

einsatzNummer = 0;

tag.einsaetze.forEach(function(e){

einsatzNummer++;

let container = document.createElement("div");

container.className = "einsatz";

/* hier benutzen wir den gleichen Aufbau wie beim normalen Einsatz */

container.innerHTML = `
<div class="einsatzHeader">
<h3 class="einsatzTitel">Einsatz ${einsatzNummer}</h3>
<span class="toggleSymbol">▼</span>
</div>

<div class="einsatzInhalt">

<div class="einsatzFeld">
<label>Einsatzart</label>
<input type="text" value="${e.einsatzart}">
</div>

<div class="einsatzFeld">
<label>Adresse</label>
<input type="text" class="adresseFeld" value="${e.adresse}">
</div>

<div class="einsatzFeld">
<label>Melder</label>
<input type="text" value="${e.melder}">
</div>

<div class="zeitGrid">

<div class="einsatzFeld">
<label>Meldung</label>
<input type="time" value="${e.meldung}">
</div>

<div class="einsatzFeld">
<label>Eintreffen</label>
<input type="time" value="${e.eintreffen}">
</div>

<div class="einsatzFeld">
<label>Abfahrt</label>
<input type="time" value="${e.abfahrt}">
</div>

</div>

<div class="einsatzFeldGross">
<label>Feststellung</label>
<textarea rows="3">${e.feststellung}</textarea>
</div>

<div class="einsatzFeldGross">
<label>Maßnahmen</label>
<textarea rows="3">${e.massnahmen}</textarea>
</div>

<div class="einsatzFeldGross">
<label>Bemerkung</label>
<textarea rows="2">${e.bemerkung}</textarea>
</div>

</div>
`;

document.getElementById("einsatzListe").appendChild(container);

});

}


function speichereAktuellenTag(){

let arbeitstag = {};

arbeitstag.datum = document.getElementById("datum").value;
arbeitstag.schicht = document.getElementById("schicht").value;
arbeitstag.wagen = document.getElementById("wagen").value;
arbeitstag.kollege = document.getElementById("kollege").value;

arbeitstag.einsaetze = [];

let einsaetze = document.querySelectorAll(".einsatz");

einsaetze.forEach(function(einsatz){

let daten = {};

let inputs = einsatz.querySelectorAll("input, textarea");

daten.einsatzart = inputs[0].value;
daten.adresse = inputs[1].value;
daten.melder = inputs[2].value;
daten.meldung = inputs[3].value;
daten.eintreffen = inputs[4].value;
daten.abfahrt = inputs[5].value;
daten.feststellung = inputs[6].value;
daten.massnahmen = inputs[7].value;
daten.bemerkung = inputs[8].value;

arbeitstag.einsaetze.push(daten);

});

return arbeitstag;

}

function autoResizeTextarea(textarea){

textarea.style.height = "auto";
textarea.style.height = textarea.scrollHeight + "px";

}

document.addEventListener("input", function(e){

if(e.target.tagName === "TEXTAREA"){
autoResizeTextarea(e.target);
}

});

function exportJSON(){

let archiv = JSON.parse(localStorage.getItem("MED_Archiv")) || [];
archiv.sort((a,b)=> new Date(b.datum) - new Date(a.datum));

if(archiv.length === 0){
alert("Keine Daten zum Speichern vorhanden.");
return;
}

let jsonString = JSON.stringify(archiv, null, 2);

let blob = new Blob([jsonString], {type:"application/json"});

let url = URL.createObjectURL(blob);

let a = document.createElement("a");

let datum = new Date().toISOString().split("T")[0];

a.href = url;
a.download = "MED_Backup_" + datum + ".json";

a.click();

URL.revokeObjectURL(url);

}

document.getElementById("jsonDateiInput").addEventListener("change", function(event){

let file = event.target.files[0];

if(!file){
return;
}

let reader = new FileReader();

reader.onload = function(e){

try{

let daten = JSON.parse(e.target.result);

localStorage.setItem("MED_Archiv", JSON.stringify(daten));

alert("Backup erfolgreich geladen.");

ladeHistorie();

}catch(error){

alert("Fehler beim Laden der JSON-Datei.");

}

};

reader.readAsText(file);

});

</script>
