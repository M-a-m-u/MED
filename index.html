<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>MED – Mobiler Entstörungsdienst</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#50d857;
color:white;
text-align:center;
}

/* Cover */

#cover{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100dvh;
cursor:pointer;
}

#cover h1{
font-size:4.2em;
margin-bottom:10px;
}

#cover p{
font-size:1em;
opacity:0.8;
}

/* Hauptseite */

#mainPage{
display:none;
padding:20px;
}

h2{
margin-top:20px;
}

.feld{
margin-top:15px;
display:flex;
flex-direction:column;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

input, select{
width:100%;
box-sizing:border-box;
height:42px;
padding:6px 10px;
font-size:16px;
border-radius:8px;
border:none;
margin-top:5px;
}

input[type="date"],
input[type="time"]{
width:100%;
height:42px;
box-sizing:border-box;
font-size:16px;
padding:6px 8px;
}

#neuerEinsatz{
margin-top:30px;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
background:white;
color:#50d857;
font-weight:bold;
cursor:pointer;
width:100%;
}

#einsatzListe{
margin-top:25px;
}

.einsatz{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:15px;
text-align:left;
}

.einsatzFeld{
margin-top:10px;
display:flex;
flex-direction:column;
}

.einsatzFeldGross{
margin-top:12px;
display:flex;
flex-direction:column;
}

.einsatzFeldGross textarea{
width:100%;
box-sizing:border-box;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
resize:vertical;
}

.einsatzFeld input{
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:4px;
}

.zeitGrid{
display:grid;
grid-template-columns:repeat(3, minmax(0,1fr));
gap:10px;
margin-top:10px;
}

.zeitGrid input{
width:100%;
min-width:0;
}

.einsatzHeader{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.toggleSymbol{
font-size:18px;
}

.einsatzInhalt{
margin-top:10px;
}

#tagSpeichern{
margin-top:25px;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
background:#222;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<!-- Cover -->

<div id="cover" onclick="startApp()">
<h1>MED</h1>
<p>Mobiler Entstörungsdienst</p>
<p>Tippen zum Starten</p>
</div>


<!-- Hauptseite -->

<div id="mainPage">

<h2>Arbeitstag</h2>

<div class="grid2">

<div class="feld">
<label>Datum</label>
<input type="date" id="datum">
</div>

<div class="feld">
<label>Schicht</label>
<select id="schicht">
<option>Früh</option>
<option>Spät</option>
<option>Nacht</option>
<option>Andere</option>
</select>
</div>

<div class="feld">
<label>Wagen</label>

<select id="wagen">
<option value="">Fahrzeug wählen</option>
<option>WG 408</option>
<option>WG 351</option>
<option>WG 508</option>
<option>WG 509</option>
<option>WG 215</option>
<option>WG 216</option>
</select>

</div>

<div class="feld">
<label>Kollege</label>

<input list="kollegenListe" id="kollege" placeholder="Kollege wählen">

<datalist id="kollegenListe">
<option value="Schischke">
<option value="Tichelkamp">
<option value="Stoll">
<option value="Zöller">
<option value="Dogan">
</datalist>

<datalist id="einsatzartenListe">

<option value="Gasgeruch">
<option value="Gasdruckproblem">
<option value="Gasleitung beschädigt">
<option value="Wasserrohrbruch">
<option value="Wasser aus Erde">
<option value="Laterne angefahren">
<option value="Stromausfall">
<option value="Hausanschluss Störung">
<option value="Zählerwechsel">
<option value="Kontrolle">

</datalist>

</div>

</div>


<button id="neuerEinsatz">+ Einsatz hinzufügen</button>

<div id="einsatzListe"></div>

<button id="tagSpeichern">Arbeitstag speichern</button>


<script>

function startApp(){
document.getElementById("cover").style.display="none";
document.getElementById("mainPage").style.display="block";
}


/* Datum automatisch setzen */

window.onload = function(){

let heute = new Date().toISOString().split("T")[0];
document.getElementById("datum").value = heute;


/* letzten Wagen laden */

let letzterWagen = localStorage.getItem("wagen");

if(letzterWagen){
document.getElementById("wagen").value = letzterWagen;
}


/* letzten Kollegen laden */

let letzterKollege = localStorage.getItem("kollege");

if(letzterKollege){
document.getElementById("kollege").value = letzterKollege;
}

/* letzte Schicht laden */

let letzteSchicht = localStorage.getItem("schicht");

if(letzteSchicht){
document.getElementById("schicht").value = letzteSchicht;
}

}

document.getElementById("wagen").addEventListener("change", function(){
localStorage.setItem("wagen", this.value);
});


document.getElementById("kollege").addEventListener("change", function(){
localStorage.setItem("kollege", this.value);
});


document.getElementById("schicht").addEventListener("change", function(){
localStorage.setItem("schicht", this.value);
});


let einsatzNummer = 0;

document.getElementById("neuerEinsatz").addEventListener("click", function(){

einsatzNummer++;

let container = document.createElement("div");
container.className = "einsatz";

container.innerHTML = `
<div class="einsatzHeader">
<h3 class="einsatzTitel">Einsatz ${einsatzNummer}</h3>
<span class="toggleSymbol">▼</span>
</div>

<div class="einsatzInhalt">

<div class="einsatzFeld">
<label>Einsatzart</label>
<input list="einsatzartenListe" placeholder="Einsatzart wählen oder tippen">
</div>

<div class="einsatzFeld">
<label>Adresse</label>
<input type="text" class="adresseFeld" placeholder="Straße / Hausnummer">
</div>

<div class="einsatzFeld">
<label>Melder</label>
<input type="text" placeholder="Name oder Firma">
</div>

<div class="zeitGrid">

<div class="einsatzFeld">
<label>Meldung</label>
<input type="time">
</div>

<div class="einsatzFeld">
<label>Eintreffen</label>
<input type="time">
</div>

<div class="einsatzFeld">
<label>Abfahrt</label>
<input type="time">
</div>

</div>

<div class="einsatzFeldGross">
<label>Feststellung</label>
<textarea rows="3" placeholder="Situation vor Ort"></textarea>
</div>

<div class="einsatzFeldGross">
<label>Maßnahmen</label>
<textarea rows="3" placeholder="Was wurde unternommen"></textarea>
</div>

<div class="einsatzFeldGross">
<label>Bemerkung</label>
<textarea rows="2" placeholder="Weitere Hinweise"></textarea>
</div>
</div>
`;

container.querySelector(".einsatzHeader").addEventListener("click", function(){

let inhalt = container.querySelector(".einsatzInhalt");
let symbol = container.querySelector(".toggleSymbol");

if(inhalt.style.display === "none"){
inhalt.style.display = "block";
symbol.textContent = "▼";
}else{
inhalt.style.display = "none";
symbol.textContent = "▶";
}

});

let adresseInput = container.querySelector(".adresseFeld");
let titel = container.querySelector(".einsatzTitel");

adresseInput.addEventListener("input", function(){

if(this.value.trim() !== ""){
titel.textContent = "Einsatz " + einsatzNummer + " – " + this.value;
}else{
titel.textContent = "Einsatz " + einsatzNummer;
}

});

document.getElementById("einsatzListe").appendChild(container);

});

document.getElementById("tagSpeichern").addEventListener("click", function(){

let arbeitstag = {};

arbeitstag.datum = document.getElementById("datum").value;
arbeitstag.schicht = document.getElementById("schicht").value;
arbeitstag.wagen = document.getElementById("wagen").value;
arbeitstag.kollege = document.getElementById("kollege").value;

arbeitstag.einsaetze = [];

let einsaetze = document.querySelectorAll(".einsatz");

einsaetze.forEach(function(einsatz){

let daten = {};

let inputs = einsatz.querySelectorAll("input, textarea");

daten.einsatzart = inputs[0].value;
daten.adresse = inputs[1].value;
daten.melder = inputs[2].value;
daten.meldung = inputs[3].value;
daten.eintreffen = inputs[4].value;
daten.abfahrt = inputs[5].value;
daten.feststellung = inputs[6].value;
daten.massnahmen = inputs[7].value;
daten.bemerkung = inputs[8].value;

arbeitstag.einsaetze.push(daten);

});

downloadJSON(arbeitstag);

});

function downloadJSON(daten){

let json = JSON.stringify(daten, null, 2);

let blob = new Blob([json], {type: "application/json"});

let url = URL.createObjectURL(blob);

let link = document.createElement("a");

let datum = new Date().toISOString().split("T")[0];

link.href = url;
link.download = "MED_" + datum + ".json";

link.click();

URL.revokeObjectURL(url);

}




</script>

</body>
</html>
